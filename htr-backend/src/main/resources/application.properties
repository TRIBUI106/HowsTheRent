spring.application.name=htr-backend
spring.config.import=optional:file:../.env[.properties]

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/htr}
spring.datasource.username=${DB_USER:htr}
spring.datasource.password=${DB_PASSWORD:secret}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# JWT
jwt.secret=${JWT_SECRET:changeThisToASecureRandomStringAtLeast256BitsLong!!}
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

# Mail
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# MinIO
minio.url=${MINIO_URL:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
minio.bucket=${MINIO_BUCKET:htr}

# PayOS
payos.client-id=${PAYOS_CLIENT_ID:}
payos.api-key=${PAYOS_API_KEY:}
payos.checksum-key=${PAYOS_CHECKSUM_KEY:}

# Quartz
spring.quartz.job-store-type=memory
spring.quartz.properties.org.quartz.threadPool.threadCount=3

# Async
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=10
spring.task.execution.thread-name-prefix=async-
server.port=${SERVER_PORT:8080}
